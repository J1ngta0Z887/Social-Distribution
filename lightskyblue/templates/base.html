{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}LightSkyBlue{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
  <nav class="navbar">
    <div class="brand">lightskyblue</div>

    <div class="nav-right">
      {% if user.is_authenticated %}
        <span class="user">Hi, {{ user.username }}</span>
        <form method="post" action="{% url 'logout' %}" class="logout-form">
            {% csrf_token %}
            <button type="submit" class="link btn-link">Logout</button>
        </form>
      {% else %}
        <a class="link" href="{% url 'login' %}">Login</a>
      {% endif %}
    </div>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
