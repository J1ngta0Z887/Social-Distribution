{% extends "base.html" %}

{% block title %}Create Entry{% endblock %}

{% block content %}
  <div class="card">
    <h1 class="title">Create Entry</h1>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit" class="btn-primary">Post</button>
      <a href="{% url 'my_entries' %}" class="btn-outline">Cancel</a>
    </form>
  </div>
{% endblock %}
